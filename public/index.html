<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111">
  <meta name="description" content="Daily Brew — 毎日のニュースを1ページで">
  <title>DAILY BREW</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="170c155b-3007-43db-84ba-1646b3c5e9c0"></script>
</head>
<body>
  <header id="header">
    <div class="header-left">
      <button id="btn-prev" class="nav-btn" aria-label="前日">◀</button>
    </div>
    <div class="header-center">
      <div class="title-row">
        <h1 class="title">DAILY BREW</h1>
        <button id="btn-theme" class="theme-toggle" aria-label="テーマ切替">☀</button>
      </div>
      <button id="btn-date" class="date-display" aria-label="日付選択"></button>
      <input type="date" id="date-picker" class="date-picker-hidden">
    </div>
    <div class="header-right">
      <button id="btn-next" class="nav-btn" aria-label="翌日">▶</button>
    </div>
  </header>

  <!-- Mobile tab bar -->
  <nav id="mobile-tabs">
    <button class="tab-btn active" data-tab="paper">新聞</button>
    <button class="tab-btn" data-tab="info">Sources / Market</button>
  </nav>

  <div id="main-layout">
    <main id="viewer-container">
      <div id="loading" class="overlay">
        <div class="spinner"></div>
        <p>読み込み中...</p>
      </div>
      <div id="error" class="overlay hidden">
        <p id="error-message"></p>
        <button id="btn-retry" class="retry-btn">再試行</button>
      </div>
      <div id="pdf-wrapper">
        <canvas id="pdf-canvas"></canvas>
      </div>
      <div id="zoom-controls">
        <button id="btn-zoom-out" class="zoom-btn" aria-label="縮小">−</button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button id="btn-zoom-in" class="zoom-btn" aria-label="拡大">+</button>
      </div>
    </main>

    <aside id="sidebar"></aside>
  </div>

  <script src="/vendor/hammer.min.js"></script>
  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/viewer.js"></script>
  <script type="module" src="/js/navigation.js"></script>
  <script type="module" src="/js/sidebar.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
