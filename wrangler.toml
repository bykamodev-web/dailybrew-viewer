name = "dailybrew-viewer"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"
html_handling = "none"

# R2 credentials are set via .dev.vars (local) or Cloudflare dashboard (production)
# R2_ENDPOINT_URL, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME
